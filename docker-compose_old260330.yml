version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: oslar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_lsar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./data:/data

  metabase:
    image: metabase/metabase:latest
    container_name: oslar-metabase
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3001:3000"

  web:
  build: .
  restart: unless-stopped
  depends_on:
    - postgres
  environment:
    NODE_ENV: production
    PORT: 3000
  ports:
    - "3000:3000"

  importer:
    image: python:3.12-slim
    container_name: oslar-importer
    working_dir: /work
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: open_lsar
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - ./oslar-tools:/work
      - ./data:/data
    command: tail -f /dev/null

volumes:
  postgres_data:
