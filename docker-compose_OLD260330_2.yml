services:
  oslar-web:
    volumes:
      - ./data:/app/data
  postgres:
    image: postgres:18
    container_name: oslar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_lsar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./data/postgres:/var/lib/postgresql/data

  s1000d-loader:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
    environment:
      DB_NAME: open_lsar
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      S1000D_DATA_DIR: /app/data/s1000d_packages
      S1000D_ARCHIVE_DIR: /app/data/s1000d_archive
      S1000D_MOVE_AFTER_LOAD: "false"
      S1000D_LOG_LEVEL: INFO
    command: >
      sh -c "pip install --no-cache-dir psycopg2-binary lxml &&
             python loader/loader_s1000d_v2.py"

    metabase:
    image: metabase/metabase:latest
    container_name: oslar-metabase
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3001:3000"

  importer:
    image: python:3.12-slim
    container_name: oslar-importer
    restart: unless-stopped
    command: tail -f /dev/null

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oslar-web
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/open_lsar
    ports:
      - "3000:3000"

volumes:
  postgres_data: